services:
  cocos-rag:
    build: .
    image: cocos-rag-mcp
    container_name: cocos-rag
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # SSE 模式：作为常驻 HTTP 服务对外暴露
      - TRANSPORT=sse
      - PORT=8000
    ports:
      # 宿主机 18000 → 容器 8000
      - "18000:8000"
    volumes:
      # 持久化挂载 Chroma 向量数据库，容器销毁后数据不丢失
      - ./.data:/app/.data
